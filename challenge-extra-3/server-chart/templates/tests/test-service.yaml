apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "server-chart.fullname" . }}-test-service"
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: test
      image: busybox
      command:
        - sh
        - -c
        - "wget --header='Challenge: orcrist.org' -q -O- http://{{ include "server-chart.fullname" . }}:{{ .Values.service.port }} && echo 'Service reachable'"
  restartPolicy: Never