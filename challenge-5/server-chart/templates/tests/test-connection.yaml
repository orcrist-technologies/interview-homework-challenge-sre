# templates/tests/test-connection.yaml
apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "server-chart.fullname" . }}-test"
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: test
      image: curlimages/curl
      command: ['curl', '-i', 'http://{{ include "server-chart.fullname" . }}:8080']
  restartPolicy: Never
